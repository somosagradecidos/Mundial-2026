name: Actualizar resultados Mundial 2026

on:
  # Corre automáticamente cada 5 minutos
  schedule:
    - cron: "*/5 * * * *"
  # También te deja correrlo manualmente desde la pestaña "Actions" en GitHub
  workflow_dispatch: {}

# Necesario para que el robot pueda guardar (hacer commit de) los cambios al repo
permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install requests

      - name: Ejecutar script de actualización
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python actualizar_resultados.py

      - name: Guardar resultados.json si hubo cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resultados.json
          git diff --staged --quiet || git commit -m "Actualizar resultados Mundial 2026 [bot]"
          git push
